name: Bug Report
description: Something isn't working as expected.
labels: [bug]
body:
  - type: checkboxes
    attributes:
      label: Preflight
      description: Please confirm before submitting.
      options:
        - label: I'm using the latest version of `@byarcadia-app/plutus`.
          required: true
        - label: I searched existing issues and found no duplicate.
          required: true

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear description of the bug. Include error messages, stack traces, or screenshots if relevant.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: input
    id: reproduction
    attributes:
      label: Reproduction repository
      description: Link to a minimal GitHub repo that reproduces the bug.
      placeholder: https://github.com/...
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: "@byarcadia-app/plutus version"
      placeholder: 0.1.0
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Run `npx react-native info` and paste the output, or list relevant versions manually.
      render: shell
    validations:
      required: true

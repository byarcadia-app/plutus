name: Feature Request
description: Suggest a new hook, configuration option, or improvement.
labels: [enhancement]
body:
  - type: checkboxes
    attributes:
      label: Preflight
      description: Please confirm before submitting.
      options:
        - label: I searched existing issues and discussions and found no duplicate.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What use case are you trying to address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you envision the API or behavior? Code examples are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about or workarounds you're currently using.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links to RevenueCat docs, or anything else.
    validations:
      required: false

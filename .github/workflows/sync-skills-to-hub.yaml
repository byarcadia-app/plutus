name: Sync skills to hub

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
  workflow_dispatch:

jobs:
  plutus-setup:
    name: Sync plutus-setup to hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout hub
        uses: actions/checkout@v4
        with:
          repository: byarcadia-app/hub
          token: ${{ secrets.HUB_WRITE_TOKEN }}
          path: hub

      - name: Sync skill
        run: |
          SOURCE_DIR="source/skills/plutus-setup"
          DEST_DIR="hub/skills/plutus-setup"

          if [ ! -d "$SOURCE_DIR" ]; then
            echo "::error::Skill directory not found: skills/plutus-setup"
            exit 1
          fi

          rm -rf "$DEST_DIR"
          cp -r "$SOURCE_DIR" "$DEST_DIR"

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Format synced files
        working-directory: hub
        run: deno fmt

      - name: Check for changes
        id: diff
        working-directory: hub
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "::notice::No changes for plutus-setup"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        working-directory: hub
        env:
          GH_TOKEN: ${{ secrets.HUB_WRITE_TOKEN }}
        run: |
          BRANCH="sync/skill-plutus-setup"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH"
          git commit -m "sync(skills): update plutus-setup from byarcadia-app/plutus"
          git push -u origin "$BRANCH" --force

          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --title "sync(skills): update plutus-setup from byarcadia-app/plutus" \
              --body "$(cat <<EOF
          ## Summary
          - Automated sync of \`plutus-setup\` from [\`byarcadia-app/plutus\`](https://github.com/byarcadia-app/plutus)

          Generated by [sync-skills-to-hub](${{ github.server_url }}/byarcadia-app/plutus/actions/runs/${{ github.run_id }}) workflow.
          EOF
          )"
          else
            echo "::notice::PR #${EXISTING_PR} already exists, branch updated"
          fi
